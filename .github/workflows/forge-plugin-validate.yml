name: Forge Plugin Validate

on:
  pull_request:
    paths:
      - "squads/forge/**"
      - ".github/workflows/forge-plugin-validate.yml"
  push:
    branches:
      - main
    paths:
      - "squads/forge/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-plugins:
    runs-on: ubuntu-latest
    name: Validate Plugin Registry

    steps:
      - uses: actions/checkout@v6

      - name: Check PLUGINS.md exists
        run: |
          if [ ! -f squads/forge/PLUGINS.md ]; then
            echo "❌ squads/forge/PLUGINS.md not found"
            exit 1
          fi
          echo "✅ squads/forge/PLUGINS.md exists"

      - name: Validate PLUGINS.md format
        run: |
          # Accept both legacy plugin terminology and newer distribution terminology.
          grep -Eq "## Library (Plugins|Distributions)" squads/forge/PLUGINS.md || (echo "❌ Missing '## Library Plugins' or '## Library Distributions' section"; exit 1)
          echo "✅ Library section present"

          # Accept both legacy and current table headers.
          grep -Eq "\| (Plugin|Distribution) Name \|" squads/forge/PLUGINS.md || (echo "❌ Missing plugin/distribution registry table"; exit 1)
          echo "✅ Registry table present"

          # Check for status definitions
          grep -q "## Status Definitions" squads/forge/PLUGINS.md || (echo "❌ Missing '## Status Definitions' section"; exit 1)
          echo "✅ Status Definitions section present"

      - name: Validate plugin entries
        run: |
          # Extract plugin entries from PLUGINS.md and validate each
          echo "Validating plugin entries..."

          # Check for at least one library plugin/distribution entry (Excel MCP Server)
          grep -q "excel-mcp-server" squads/forge/PLUGINS.md || (echo "❌ Excel MCP Server entry missing"; exit 1)
          echo "✅ Excel MCP Server entry found"

          # Validate status field (must be one of: dev, beta, stable, deprecated)
          if grep "excel-mcp-server" squads/forge/PLUGINS.md | grep -qE "\| (dev|beta|stable|deprecated) \|"; then
            echo "✅ Excel MCP Server status is valid"
          else
            echo "❌ Excel MCP Server has invalid status"
            exit 1
          fi

      - name: Check documentation links
        run: |
          # Verify that FORGE.md and FORGE_SETUP.md are referenced
          grep -q "FORGE.md" squads/forge/PLUGINS.md || (echo "⚠️  FORGE.md not referenced in PLUGINS.md"; exit 1)
          echo "✅ FORGE.md referenced"

          grep -q "FORGE_SETUP.md" squads/forge/PLUGINS.md || (echo "⚠️  FORGE_SETUP.md not referenced in PLUGINS.md"; exit 1)
          echo "✅ FORGE_SETUP.md referenced"

      - name: Report validation results
        if: always()
        run: |
          echo ""
          echo "Plugin Registry Validation Complete"
          echo "- Registry file: squads/forge/PLUGINS.md"
          echo "- Library plugins/distributions registered: ✓"
          echo "- Plugin entries validated: ✓"
          echo "- Documentation links verified: ✓"
