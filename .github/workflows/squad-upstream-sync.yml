name: Squad Upstream Sync

on:
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: owner/repo for the upstream source. Defaults to the repository variable UPSTREAM_REPOSITORY.
        required: false
        type: string
      upstream_branch:
        description: Upstream branch to sync from.
        required: false
        default: main
        type: string
      target_branch:
        description: Local branch to sync into.
        required: false
        default: main
        type: string
      dry_run:
        description: Show the sync plan without pushing or opening a PR.
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '23 4 * * *'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: squad-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      INPUT_UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository }}
      INPUT_UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
      INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
      INPUT_DRY_RUN: ${{ inputs.dry_run }}
      DEFAULT_TARGET_BRANCH: ${{ github.event.repository.default_branch }}
      VARS_UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY }}
      VARS_UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Resolve sync inputs
        id: resolve
        run: |
          UPSTREAM_REPOSITORY="${INPUT_UPSTREAM_REPOSITORY:-$VARS_UPSTREAM_REPOSITORY}"
          UPSTREAM_BRANCH="${INPUT_UPSTREAM_BRANCH:-$VARS_UPSTREAM_BRANCH}"
          TARGET_BRANCH="${INPUT_TARGET_BRANCH:-$DEFAULT_TARGET_BRANCH}"
          DRY_RUN="${INPUT_DRY_RUN:-false}"

          if [ -z "$UPSTREAM_BRANCH" ]; then
            UPSTREAM_BRANCH="main"
          fi

          echo "upstream_repository=$UPSTREAM_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=$UPSTREAM_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Skip when no upstream repo is configured
        if: steps.resolve.outputs.upstream_repository == ''
        run: echo "No upstream repository configured. Set vars.UPSTREAM_REPOSITORY or provide workflow_dispatch input."

      - name: Check out target branch
        if: steps.resolve.outputs.upstream_repository != ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.target_branch }}

      - name: Configure git
        if: steps.resolve.outputs.upstream_repository != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        if: steps.resolve.outputs.upstream_repository != ''
        run: |
          git remote add upstream "https://github.com/${{ steps.resolve.outputs.upstream_repository }}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${{ steps.resolve.outputs.upstream_repository }}.git"
          git fetch origin "${{ steps.resolve.outputs.target_branch }}"
          git fetch upstream "${{ steps.resolve.outputs.upstream_branch }}"

      - name: Show sync state
        if: steps.resolve.outputs.upstream_repository != ''
        run: |
          echo "Target branch:   ${{ steps.resolve.outputs.target_branch }}"
          echo "Upstream source: ${{ steps.resolve.outputs.upstream_repository }}:${{ steps.resolve.outputs.upstream_branch }}"
          echo "Origin HEAD:     $(git rev-parse origin/${{ steps.resolve.outputs.target_branch }})"
          echo "Upstream HEAD:   $(git rev-parse upstream/${{ steps.resolve.outputs.upstream_branch }})"

      - name: Fast-forward or open sync PR
        if: steps.resolve.outputs.upstream_repository != ''
        run: |
          TARGET_BRANCH="${{ steps.resolve.outputs.target_branch }}"
          UPSTREAM_BRANCH="${{ steps.resolve.outputs.upstream_branch }}"
          UPSTREAM_REPOSITORY="${{ steps.resolve.outputs.upstream_repository }}"
          DRY_RUN="${{ steps.resolve.outputs.dry_run }}"

          if [ "$(git rev-parse origin/$TARGET_BRANCH)" = "$(git rev-parse upstream/$UPSTREAM_BRANCH)" ]; then
            echo "Already in sync."
            exit 0
          fi

          if git merge-base --is-ancestor "origin/$TARGET_BRANCH" "upstream/$UPSTREAM_BRANCH"; then
            echo "Fast-forward sync is possible."
            if [ "$DRY_RUN" = "true" ]; then
              echo "Dry run enabled; not pushing fast-forward update."
              exit 0
            fi

            git checkout "$TARGET_BRANCH"
            git merge --ff-only "upstream/$UPSTREAM_BRANCH"
            git push origin "HEAD:$TARGET_BRANCH"
            echo "Fast-forward sync completed."
            exit 0
          fi

          SYNC_BRANCH="sync/upstream-$(date -u +%Y%m%d-%H%M%S)"
          echo "Branch divergence detected; preparing sync PR on $SYNC_BRANCH."

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run enabled; would create $SYNC_BRANCH and open a sync PR."
            exit 0
          fi

          git checkout -b "$SYNC_BRANCH" "origin/$TARGET_BRANCH"
          if ! git merge --no-ff --no-edit "upstream/$UPSTREAM_BRANCH"; then
            echo "::error::Automatic merge from upstream failed. Resolve conflicts manually."
            git merge --abort || true
            exit 1
          fi

          git push origin "$SYNC_BRANCH"

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$SYNC_BRANCH" \
            --title "chore: sync upstream ${UPSTREAM_REPOSITORY}@${UPSTREAM_BRANCH} into ${TARGET_BRANCH}" \
            --body "## Summary

          Synchronize \`${TARGET_BRANCH}\` with upstream \`${UPSTREAM_REPOSITORY}@${UPSTREAM_BRANCH}\`.

          ## Validation

          - Sync branch was generated by \`squad-upstream-sync.yml\`
          - Review the upstream delta and merge normally after approval

          ## Review focus

          - Confirm the upstream commits are expected
          - Confirm no local-only changes were overwritten unexpectedly

          ## Upstream

          - [x] Sync from upstream is required before merge
          - [ ] Sync back to upstream is required after merge
          - [ ] No upstream sync required

          Notes:
          Generated automatically by GitHub Actions." \
            --label "sync:upstream"
